version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        # Install a decoupled global binary to bypass the container's dynamic import block
        - npm install -g pnpm
        # Permit native compilation engines to run their lifecycle assets
        - pnpm config set ignore-scripts false
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'