version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        # Enable Corepack to utilize the native package manager setup
        - corepack enable
        # Install pnpm and force it to handle peer conflicts gracefully
        - corepack prepare pnpm@latest --activate
        - pnpm config set auto-install-peers true
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'