version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Step up to Node 22 to provide the node:sqlite module
        - nvm use 22 || nvm install 22
        - npm install -g pnpm
        - pnpm config set ignore-scripts true
        - pnpm install --no-frozen-lockfile --prod=false
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'