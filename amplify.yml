version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20
        # Add loglevel error to stop large warning streams from blocking logs
        - npm install --legacy-peer-deps --loglevel error
    build:
      commands:
        - npm run build
  artifacts:
    # Set this to dist to match Astro / Vite build outputs
    baseDirectory: dist
    files:
      - '**/*'