version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Force a modern Node.js runtime environment 
        - nvm use 20 || nvm install 20
        # Remove --prefer-offline to ensure fresh dependencies fetch properly
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'