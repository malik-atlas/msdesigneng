version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22 || nvm install 22
        - npm install -g pnpm
        - pnpm config set ignore-scripts true
        # Use immutable installs to skip deep structural tree mutation calculations
        - pnpm install --frozen-lockfile --prod=false
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      # Cache pnpm global virtual store and local workspace assets
      - .pnpm-store/**/*
      - node_modules/**/*